<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dotto — Todo List</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/todo.css">
</head>
<body>
    <div class="app-layout">
        <!-- 사이드바 -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="3" width="18" height="18" rx="4" stroke="#fff" stroke-width="2"/></svg>
                </div>
                <span class="sidebar-logo-text">Dotto</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/todo" class="sidebar-link active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                    <span>todolist</span>
                </a>
                <a href="/mypage" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span>mypage</span>
                </a>
            </nav>
            <div class="sidebar-user">
                <div class="sidebar-avatar" id="sidebarAvatar">U</div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="sidebarName">user</div>
                    <div class="sidebar-user-status">온라인</div>
                </div>
                <button class="sidebar-logout" id="logoutBtn" title="로그아웃">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </aside>

        <!-- 메인 콘텐츠 -->
        <main class="main-content">
            <h1 class="page-title">Todo List</h1>
            <p class="page-date" id="currentDate"></p>

            <!-- 통계 카드 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div>
                        <div class="stat-label">전체</div>
                        <div class="stat-number" id="statTotal">0</div>
                    </div>
                    <div class="stat-icon">
                        <svg viewBox="0 0 40 40" fill="none"><rect x="6" y="4" width="28" height="32" rx="4" fill="#E8F9F1" stroke="#3EC997" stroke-width="2"/><path d="M14 16h12M14 22h8" stroke="#3EC997" stroke-width="2" stroke-linecap="round"/></svg>
                    </div>
                </div>
                <div class="stat-card">
                    <div>
                        <div class="stat-label">완료</div>
                        <div class="stat-number" id="statCompleted">0</div>
                    </div>
                    <div class="stat-icon">
                        <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="14" fill="#E8F9F1" stroke="#3EC997" stroke-width="2"/><path d="M14 20l4 4 8-8" stroke="#3EC997" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                </div>
                <div class="stat-card">
                    <div>
                        <div class="stat-label">진행</div>
                        <div class="stat-number" id="statInProgress">0</div>
                    </div>
                    <div class="stat-icon">
                        <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="14" fill="#E0F2FE" stroke="#3B82F6" stroke-width="2"/><path d="M20 12v8l5 3" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                </div>
                <div class="stat-card progress-card">
                    <div>
                        <div class="stat-label">진행률</div>
                        <div class="progress-info"><strong id="progressText">0/0</strong> 완료</div>
                    </div>
                    <div class="progress-ring-container">
                        <svg class="progress-ring" width="80" height="80" viewBox="0 0 80 80">
                            <circle class="progress-ring-bg" cx="40" cy="40" r="34"/>
                            <circle class="progress-ring-fill" cx="40" cy="40" r="34" id="progressRing"
                                stroke-dasharray="213.63"
                                stroke-dashoffset="213.63"/>
                        </svg>
                        <div class="progress-percentage" id="progressPercent">0%</div>
                    </div>
                </div>
            </div>

            <!-- 할 일 추가 -->
            <div class="add-todo-section">
                <div class="add-todo-input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                    <input class="add-todo-input" type="text" id="todoInput" placeholder="새로운 할 일을 입력하세요...">
                </div>
                <button class="btn-add" id="addTodoBtn">추가하기</button>
            </div>

            <!-- 진행 중 -->
            <div class="todo-section" id="inProgressSection">
                <div class="section-header">
                    <div class="section-dot in-progress"></div>
                    <span class="section-title">진행 중</span>
                    <span class="section-count" id="inProgressCount">0</span>
                </div>
                <div class="todo-list" id="inProgressList"></div>
            </div>

            <!-- 완료 -->
            <div class="todo-section" id="completedSection">
                <div class="section-header">
                    <div class="section-dot completed"></div>
                    <span class="section-title">완료</span>
                    <span class="section-count" id="completedCount">0</span>
                </div>
                <div class="todo-list" id="completedList"></div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>
    <script src="/js/todo.js"></script>
</body>
</html>
