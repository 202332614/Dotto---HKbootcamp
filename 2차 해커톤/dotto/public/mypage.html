<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dotto — 마이페이지</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/mypage.css">
</head>
<body>
    <div class="app-layout">
        <!-- 사이드바 -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="3" width="18" height="18" rx="4" stroke="#fff" stroke-width="2"/></svg>
                </div>
                <span class="sidebar-logo-text">Dotto</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/todo" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                    <span>todolist</span>
                </a>
                <a href="/mypage" class="sidebar-link active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span>mypage</span>
                </a>
            </nav>
            <div class="sidebar-user">
                <div class="sidebar-avatar" id="sidebarAvatar">U</div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="sidebarName">user</div>
                    <div class="sidebar-user-status">온라인</div>
                </div>
                <button class="sidebar-logout" id="logoutBtn" title="로그아웃">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </aside>

        <!-- 메인 콘텐츠 -->
        <main class="main-content mypage-container">
            <h1 class="page-title">My Page</h1>
            <p class="page-date">프로필 및 계정 설정</p>

            <!-- 프로필 카드 -->
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar-large" id="profileAvatar">U</div>
                    <div class="profile-meta">
                        <h2 id="profileName">user</h2>
                        <p id="profileBio">소개가 없습니다.</p>
                        <div class="join-date">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            <span id="joinDate">가입일</span>
                        </div>
                    </div>
                </div>

                <div class="settings-section">
                    <div class="settings-section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        프로필 정보
                    </div>
                    <div class="settings-row">
                        <div class="settings-field">
                            <label for="editUsername">아이디</label>
                            <input type="text" id="editUsername" disabled>
                        </div>
                        <div class="settings-field">
                            <label for="editNickname">닉네임</label>
                            <input type="text" id="editNickname" placeholder="닉네임을 입력하세요">
                        </div>
                    </div>
                    <div class="settings-row single">
                        <div class="settings-field">
                            <label for="editBio">소개</label>
                            <textarea id="editBio" placeholder="한 줄 소개를 작성하세요" maxlength="200"></textarea>
                        </div>
                    </div>
                    <div class="settings-actions">
                        <button class="btn-save" id="saveProfileBtn">저장하기</button>
                    </div>
                </div>
            </div>

            <!-- 비밀번호 변경 -->
            <div class="password-card">
                <div class="settings-section">
                    <div class="settings-section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                        비밀번호 변경
                    </div>
                    <div class="settings-row">
                        <div class="settings-field">
                            <label for="currentPw">현재 비밀번호</label>
                            <input type="password" id="currentPw" placeholder="현재 비밀번호">
                        </div>
                        <div class="settings-field">
                            <label for="newPw">새 비밀번호</label>
                            <input type="password" id="newPw" placeholder="새 비밀번호">
                        </div>
                    </div>
                    <div class="settings-row single">
                        <div class="settings-field">
                            <label for="newPwCheck">새 비밀번호 확인</label>
                            <input type="password" id="newPwCheck" placeholder="새 비밀번호 확인">
                        </div>
                    </div>
                    <div class="settings-actions">
                        <button class="btn-save" id="changePwBtn">비밀번호 변경</button>
                    </div>
                </div>
            </div>

            <!-- 위험 영역 -->
            <div class="danger-card">
                <div class="settings-section">
                    <div class="settings-section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        계정 삭제
                    </div>
                    <p class="danger-desc">
                        계정을 삭제하면 모든 데이터가 영구적으로 삭제됩니다.<br>
                        이 작업은 되돌릴 수 없습니다.
                    </p>
                    <button class="btn-danger" id="deleteAccountBtn">계정 삭제하기</button>
                </div>
            </div>
        </main>
    </div>

    <!-- 삭제 확인 모달 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-box">
            <h3>정말 삭제하시겠습니까?</h3>
            <p>계정과 모든 할 일 데이터가<br>영구적으로 삭제됩니다.</p>
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelDeleteBtn">취소</button>
                <button class="btn-danger" id="confirmDeleteBtn">삭제</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="/js/mypage.js"></script>
</body>
</html>
